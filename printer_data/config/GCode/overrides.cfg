####################################################################################
##                                    Homing Override
####################################################################################
[homing_override]																		# Homing override 
axes: xyz                    															# Override axis
set_position_z: 0           															# Set the Z position to 0
gcode:
    G90                     															# Absolute positioning mode
    G0 Z10 F1200           										 						# Move Z axis to 10mm
    G28 Y                   															# Home Y axis
    G28 X                   															# Home X axis
    G1 X175 Y175 F7200      															# Move to the middle of the bed
    G28 Z                   															# Home Z axis again
