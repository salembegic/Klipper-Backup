######################################################################
##								SB2209								##
######################################################################

[mcu SB2209]															# Toolhead MCU configuration
canbus_uuid: f385709022c2												# CAN bus UUID

#---------------------------------------------------------------------

[adxl345 SB2209]														# Toolhead accelerometer configuration
cs_pin: SB2209:gpio1                   									# Chip select pin
spi_software_sclk_pin: SB2209:gpio2    									# SPI clock pin
spi_software_mosi_pin: SB2209:gpio0    									# SPI MOSI pin
spi_software_miso_pin: SB2209:gpio3    									# SPI MISO pin
axes_map: z,-y,x                       									# Axis mapping

#####################################################################
##	                 Temperature Monitoring
#####################################################################

[temperature_sensor EBB_NTC]            								# Temperature sensor configuration
sensor_type: Generic 3950               								# Sensor type
sensor_pin: SB2209:gpio28               								# Sensor pin
