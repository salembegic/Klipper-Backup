[include Mainsail/mainsail.cfg]												# Include Mainsail configuration

[include shell_command.cfg]													# Include GCode Shell Command configuration

[include autotune_tmc.cfg]													# Include TMC Autotune configuration

[include KAMP_Settings.cfg]													# Include KAMP configuration

[virtual_sdcard]
path: /home/biqu/printer_data/gcodes    # Path to the virtual SD card directory
on_error_gcode: CANCEL_PRINT            # G-code to execute on error (defined in CANCEL_PRINT macro)

[gcode_arcs]
resolution: 0.1                         # Arc interpolation resolution, handles G2/G3 commands

[exclude_object]                        # Exclude object for cancellation

[force_move]
enable_force_move: true                 # Enable force move feature



######################################################################
##						Printer model definition					##
######################################################################

[printer]                             									# Printer configuration
kinematics: limited_corexy                    							# Printer type
max_velocity: 600                    									# Maximum X/Y-axis velocity
max_z_velocity: 50                    									# Maximum Z-axis velocity
max_x_accel: 10000														# Maximum Z-axis acceleration
max_y_accel: 10000														# Maximum Z-axis acceleration
max_z_accel: 100                      									# Maximum Z-axis acceleration
minimum_cruise_ratio: 0.5             									# Cruise ratio
square_corner_velocity: 10            									# Square corner velocity













