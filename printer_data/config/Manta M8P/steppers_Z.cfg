######################################################################
##								Z-Axis								##
######################################################################

# Z0: Front left
# Z1: Back middle
# Z2: Front right

[stepper_z]																# Z-axis motor settings
step_pin: PB8                         									# Z-axis motor pulse pin
dir_pin: !PB7                         									# Z-axis motor direction pin
enable_pin: !PE0                     	 								# Z-axis motor enable pin
microsteps: 16                        									# Motor microstep setting
rotation_distance: 4                  									# Active pulley circumference
endstop_pin: probe:z_virtual_endstop  									# Limit switch pin
position_max: 235                     									# Z-axis maximum travel
position_min: -5.0                    									# Z-axis minimum travel
homing_speed: 20                      									# Homing speed
homing_retract_dist: 0                									# Homing setback distance

#---------------------------------------------------------------------

[tmc2209 stepper_z]                   # TMC2209 driver settings
uart_pin: PB9                         # Driver communication port
interpolate: true                     # Enable 256 microstep interpolation
run_current: 0.8                      # Motor running current (mA)
hold_current: 0.8                     # Holding current (mA)

#---------------------------------------------------------------------

[stepper_z1]
step_pin: PB4                         									# Z-axis secondary motor pulse pin
dir_pin: !PB3                         									# Z-axis secondary motor direction pin
enable_pin: !PB6                      									# Z-axis secondary motor enable pin
microsteps: 16                        									# Motor microstep setting
rotation_distance: 4                  									# Active pulley circumference

#---------------------------------------------------------------------

[tmc2209 stepper_z1]                  # TMC2209 driver settings
uart_pin: PB5                         # Driver communication port
interpolate: true                     # Enable 256 microstep interpolation
run_current: 0.8                      # Motor running current (mA)
hold_current: 0.8                     # Holding current (mA)

#---------------------------------------------------------------------

[stepper_z2]
step_pin: PG13                        # Z2-axis motor pulse pin setting
dir_pin: !PG12                        # Z2-axis motor direction pin setting
enable_pin: !PG15                     # Z2-axis motor enable pin setting
microsteps: 16                        # Motor microsteps setting
rotation_distance: 4                  # Active pulley circumference mm

#---------------------------------------------------------------------

[tmc2209 stepper_z2]                  # TMC2209 driver settings
uart_pin: PG14                        # Driver communication port
interpolate: true                     # Enable 256 microstep interpolation
run_current: 0.8                      # Motor running current (mA)
hold_current: 0.8                     # Holding current (mA)
